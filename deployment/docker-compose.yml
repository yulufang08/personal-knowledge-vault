version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: knowledge-vault-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledge_vault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    container_name: knowledge-vault-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: knowledge_vault
      JWT_SECRET: your-secret-key-change-this
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    container_name: knowledge-vault-app
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:3001

volumes:
  postgres_data:
    driver: local
